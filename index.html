  <script>
    // Chỉ nhận tín hiệu từ hệ sinh thái Google Apps Script
    // GAS dùng subdomain động (ví dụ: n-a77itl...script.googleusercontent.com)
    const GAS_DOMAIN_SUFFIX = 'script.googleusercontent.com';
    const TTL_MS = 7 * 24 * 60 * 60 * 1000; // 7 ngày

    window.addEventListener('message', function(event) {
      // Bảo vệ: chỉ tin tưởng request đến từ các subdomain của script.googleusercontent.com
      if (!event.origin.endsWith(GAS_DOMAIN_SUFFIX)) return; 
      
      const data = event.data;
      if (!data) return;

      if (data.type === 'SAVE_AUTH') {
        const authData = {
          token: data.token,
          user: data.user,
          savedAt: Date.now()
        };
        localStorage.setItem('tthy_auth', JSON.stringify(authData));
      } 
      else if (data.type === 'CLEAR_AUTH') {
        localStorage.removeItem('tthy_auth');
      }
      else if (data.type === 'REQUEST_AUTH') {
        // Iframe yêu cầu token khi khởi động
        const storedStr = localStorage.getItem('tthy_auth');
        if (storedStr) {
          try {
            const authData = JSON.parse(storedStr);
            const age = Date.now() - authData.savedAt;
            if (age < TTL_MS) {
              // Còn hạn -> Trả về cho chính window gửi request (event.source)
              // Kèm theo đúng cái origin động (event.origin) để bảo mật
              if (event.source) {
                event.source.postMessage({
                  type: 'PROVIDE_AUTH',
                  token: authData.token,
                  user: authData.user
                }, event.origin);
              }
            } else {
              // Hết hạn -> Xóa
              localStorage.removeItem('tthy_auth');
            }
          } catch (e) {
             localStorage.removeItem('tthy_auth');
          }
        }
      }
    });
  </script>
